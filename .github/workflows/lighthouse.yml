name: Lighthouse Performance

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Audit production build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Lighthouse CI
        run: npm run lighthouse
        env:
          VITE_ARGUS_API_URL: https://argus-brain.thunderrock-labs.workers.dev
          VITE_ARGUS_DEMO_ENABLED: 'false'

      - name: Add scores to the job summary
        if: ${{ !cancelled() }}
        run: npm run lighthouse:summary

      - name: Upload Lighthouse reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-reports-${{ github.run_number }}
          path: lighthouse-results
          if-no-files-found: warn
          retention-days: 30
